<!DOCTYPE html>
<html>
<head>
<title>Love Surprise 💥</title>
<style>
body {
  margin:0;
  background:black;
  color:white;
  text-align:center;
  font-family:sans-serif;
}

button {
  margin-top:40vh;
  padding:15px 30px;
  font-size:20px;
  background:red;
  color:white;
  border:none;
  border-radius:10px;
}

#boom {
  display:none;
  font-size:80px;
}

#content {
  display:none;
}

img {
  width:250px;
  border-radius:15px;
}
</style>
</head>

<body>

<button onclick="start()">Tap to Open 💌</button>

<div id="boom">💥</div>

<div id="content">
  <h1>I Love You ❤️</h1>
  <img src="https://i.imgur.com/4AiXzf8.jpeg">
  <p>You are my everything 😘</p>
</div>

<script>
function start(){
  document.querySelector("button").style.display="none";
  document.getElementById("boom").style.display="block";

  setTimeout(()=>{
    document.getElementById("boom").style.display="none";
    document.getElementById("content").style.display="block";
  },800);
}
</script>

</body>
</html>
